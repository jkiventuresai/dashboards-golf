<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Dashboard Landing Page</title>
  <style>
    :root{
      --bg:#f5f3ed;
      --panel:#ffffff;
      --ink:#181818;
      --muted:#64645f;
      --line:#d9d5c9;
      --green:#1f5f3d;
      --shadow:0 12px 30px rgba(24,24,24,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;line-height:1.5}
    header{padding:42px 32px 30px;background:linear-gradient(120deg,#12251b,#24573a);color:#fff}
    .wrap{max-width:860px;margin:0 auto}
    h1{margin:0 0 8px;font-size:clamp(34px,5vw,58px);letter-spacing:-1.4px}
    header p{margin:0;color:rgba(255,255,255,.86);max-width:760px;font-size:17px}
    main{padding:28px 32px 70px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
    h2{margin:0 0 10px;font-size:22px;letter-spacing:-.3px}
    h3{margin:22px 0 8px;font-size:17px}
    p{margin:0 0 12px;color:#30302d}
    .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    a.button{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:14px;padding:13px 16px;font-weight:800;border:1px solid var(--green);min-height:46px}
    a.primary{background:var(--green);color:#fff}
    a.secondary{background:#fff;color:var(--green)}
    footer{margin-top:18px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:720px){header,main{padding-left:16px;padding-right:16px}.cta-row a.button{width:100%}}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Golf Dashboard</h1>
      <p>Public landing page for the live golf performance dashboard and golf forms.</p>
    </div>
  </header>

  <main>
    <section class="wrap panel">
      <h2>Active Dashboard</h2>
      <div class="cta-row">
        <a class="button primary" href="dashboard-v9.html">Open Active Dashboard</a>
      </div>

      <h3>Golf Forms</h3>
      <div class="cta-row">
        <a class="button secondary" href="golf-today-v2.html">Golf Today Form</a>
        <a class="button secondary" href="golfvoc.html">Post Golf Survey</a>
        <a class="button secondary" href="adopt-a-golf-hole-form.html">Adopt a Golf Hole</a>
      </div>
    </section>

    <footer class="wrap">Golf dashboard landing page.</footer>
  </main>
</body>
</html>
